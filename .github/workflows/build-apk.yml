# ============================================================
# HHMusic — Android APK 自动编译
# 触发条件：
#   - push / PR 到 main 分支（android/ 下有变更时）
#   - 手动触发 (workflow_dispatch)
#   - 打 tag (v*) 时额外产出 release APK
# ============================================================
name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
    paths:
      - 'android/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up Android SDK
        shell: bash
        run: |
          CWD=$(pwd)  # should be android/
          SDK_ROOT=/usr/local/lib/android/sdk
          if [ ! -d "$SDK_ROOT" ]; then
            SDK_ROOT=$HOME/android-sdk
            echo "Pre-installed SDK not found, downloading to $SDK_ROOT ..."
            mkdir -p "$SDK_ROOT"
            CMDLINE_URL=$(curl -sL "https://developer.android.com/studio#command-line-tools-only" 2>/dev/null | grep -oP 'commandlinetools-linux-[0-9]+_latest\.zip' | head -1 || true)
            if [ -z "$CMDLINE_URL" ]; then
              CMDLINE_URL="commandlinetools-linux-11076708_latest.zip"
            fi
            curl -sL -o "$SDK_ROOT/cmdline-tools.zip" "https://dl.google.com/android/repository/$CMDLINE_URL"
            unzip -q "$SDK_ROOT/cmdline-tools.zip" -d "$SDK_ROOT/cmdline-tools"
            mv "$SDK_ROOT/cmdline-tools/cmdline-tools" "$SDK_ROOT/cmdline-tools/latest"
            rm -f "$SDK_ROOT/cmdline-tools.zip"
            # 接受许可并安装 platform 34
            yes | "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses --sdk_root=$SDK_ROOT > /dev/null 2>&1 || true
            yes | "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "platforms;android-34" "build-tools;34.0.0" --sdk_root=$SDK_ROOT > /dev/null 2>&1 || true
          else
            echo "Using pre-installed SDK at $SDK_ROOT"
          fi
          echo "ANDROID_HOME=$SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
          echo "sdk.dir=$SDK_ROOT" > "$CWD/local.properties"
          echo "local.properties written: sdk.dir=$SDK_ROOT"
          echo "SDK setup done"

      - name: Decode keystore (if available)
        id: keystore
        shell: bash
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks
            echo "keystore_file=app/keystore.jks" >> $GITHUB_OUTPUT
            echo "keystore_password=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_OUTPUT
            echo "key_alias=${{ secrets.KEY_ALIAS }}" >> $GITHUB_OUTPUT
            echo "key_password=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_OUTPUT
            echo "has_keystore=true" >> $GITHUB_OUTPUT
          else
            echo "has_keystore=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Debug APK
        id: build
        continue-on-error: true
        shell: bash
        run: |
          ./gradlew assembleDebug --stacktrace 2>&1 | tee ../build.log
          exit ${PIPESTATUS[0]}

      - name: Show build errors on failure
        if: steps.build.outcome == 'failure'
        shell: bash
        run: |
          LOG=../build.log
          if [ -f "$LOG" ]; then
            # 把全部日志逐行输出为 ::error:: annotation
            while IFS= read -r line; do
              if [ -n "$line" ]; then
                echo "::error title=Gradle::$line"
              fi
            done < <(tail -80 "$LOG")
          else
            echo "::error::build.log not found"
          fi
          exit 1

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: build.log
          if-no-files-found: warn

      - name: Build Release APK (if keystore configured)
        if: success() && steps.keystore.outputs.has_keystore == 'true'
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ steps.keystore.outputs.keystore_file }} \
            -Pandroid.injected.signing.store.password=${{ steps.keystore.outputs.keystore_password }} \
            -Pandroid.injected.signing.key.alias=${{ steps.keystore.outputs.key_alias }} \
            -Pandroid.injected.signing.key.password=${{ steps.keystore.outputs.key_password }}

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: HHMusic-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Release APK
        if: success() && steps.keystore.outputs.has_keystore == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: HHMusic-release-${{ github.sha }}
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: ignore

      - name: Create Release on tag
        if: success() && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
