# ============================================================
# HHMusic — Android APK 自动编译
# 触发条件：
#   - push / PR 到 main 分支（android/ 下有变更时）
#   - 手动触发 (workflow_dispatch)
#   - 打 tag (v*) 时额外产出 release APK
# ============================================================
name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
    paths:
      - 'android/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up Android SDK
        shell: bash
        run: |
          CWD=$(pwd)
          # 1) Check multiple pre-installed paths
          SDK_ROOT=""
          for dir in /usr/local/lib/android/sdk /usr/local/lib/android/sdk-root; do
            if [ -d "$dir/platforms" ]; then
              SDK_ROOT="$dir"
              break
            fi
          done

          # 2) Download command-line tools if no pre-installed SDK found
          if [ -z "$SDK_ROOT" ]; then
            SDK_ROOT=$HOME/android-sdk
            echo "Pre-installed SDK not found, downloading to $SDK_ROOT ..."
            rm -rf "$SDK_ROOT"
            mkdir -p "$SDK_ROOT/cmdline-tools"

            CMDLINE_URL="https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
            echo "Downloading: $CMDLINE_URL"
            curl -# -o "$SDK_ROOT/cmdline-tools.zip" "$CMDLINE_URL"

            unzip -q "$SDK_ROOT/cmdline-tools.zip" -d "$SDK_ROOT/cmdline-tools"
            # Handle both old (cmdline-tools/) and new (cmdline-tools/*) zip layouts
            if [ -d "$SDK_ROOT/cmdline-tools/cmdline-tools" ]; then
              mv "$SDK_ROOT/cmdline-tools/cmdline-tools" "$SDK_ROOT/cmdline-tools/latest"
            else
              mkdir -p "$SDK_ROOT/cmdline-tools/latest"
              for item in "$SDK_ROOT/cmdline-tools"/*; do
                [ "$(basename "$item")" = "latest" ] && continue
                mv "$item" "$SDK_ROOT/cmdline-tools/latest/"
              done
            fi
            rm -f "$SDK_ROOT/cmdline-tools.zip"

            echo "Accepting licenses..."
            yes | "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses --sdk_root="$SDK_ROOT" || true
            echo "Installing platforms;android-34 build-tools;34.0.0 ..."
            yes | "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
              "platforms;android-34" "build-tools;34.0.0" --sdk_root="$SDK_ROOT" || true
          else
            echo "Using pre-installed SDK at $SDK_ROOT"
          fi

          echo "ANDROID_HOME=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "sdk.dir=$SDK_ROOT" > "$CWD/local.properties"
          echo "SDK setup complete ($SDK_ROOT)"

      - name: Decode keystore (if available)
        id: keystore
        shell: bash
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks
            echo "keystore_file=app/keystore.jks" >> $GITHUB_OUTPUT
            echo "keystore_password=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_OUTPUT
            echo "key_alias=${{ secrets.KEY_ALIAS }}" >> $GITHUB_OUTPUT
            echo "key_password=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_OUTPUT
            echo "has_keystore=true" >> $GITHUB_OUTPUT
          else
            echo "has_keystore=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Debug APK
        id: build
        continue-on-error: true
        shell: bash
        run: |
          ./gradlew assembleDebug --stacktrace 2>&1 | tee ../build.log
          exit ${PIPESTATUS[0]}

      - name: Show build errors on failure
        if: steps.build.outcome == 'failure'
        shell: bash
        run: |
          LOG=../build.log
          if [ -f "$LOG" ]; then
            # Output error & warning lines as annotations
            grep -n -i 'error:\|warning:\|FAILURE:\|Unresolved reference\|Type mismatch\|expecting\|\.kt:' "$LOG" | head -60 | while IFS=: read -r nr line; do
              echo "::error title=Gradle(line $nr)::$(echo "$line" | sed 's/[]"<>[]/ /g')"
            done
            # If no specific errors found, show first 40 lines
            if ! grep -q -i 'error:\|FAILURE:' "$LOG"; then
              head -40 "$LOG" | while IFS= read -r line; do
                [ -n "$line" ] && echo "::error title=Gradle::$(echo "$line" | sed 's/[]"<>[]/ /g')"
              done
            fi
          else
            echo "::error::build.log not found"
          fi
          # Also show last 10 lines for context
          echo "--- last 10 lines ---"
          tail -10 "$LOG"
          exit 1

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: build.log
          if-no-files-found: warn

      - name: Build Release APK (if keystore configured)
        if: success() && steps.keystore.outputs.has_keystore == 'true'
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ steps.keystore.outputs.keystore_file }} \
            -Pandroid.injected.signing.store.password=${{ steps.keystore.outputs.keystore_password }} \
            -Pandroid.injected.signing.key.alias=${{ steps.keystore.outputs.key_alias }} \
            -Pandroid.injected.signing.key.password=${{ steps.keystore.outputs.key_password }}

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: HHMusic-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Release APK
        if: success() && steps.keystore.outputs.has_keystore == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: HHMusic-release-${{ github.sha }}
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: ignore

      - name: Create Release on tag
        if: success() && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
