# ============================================================
# HHMusic — Android APK 自动编译
# 触发条件：
#   - push / PR 到 main 分支（android/ 下有变更时）
#   - 手动触发 (workflow_dispatch)
#   - 打 tag (v*) 时额外产出 release APK
# ============================================================
name: Build Android APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up Android SDK & local.properties
        shell: bash
        run: |
          SDK=/usr/local/lib/android/sdk
          if [ -d "$SDK" ]; then
            echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
            echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
            echo "sdk.dir=$SDK" > local.properties
            echo "local.properties created => sdk.dir=$SDK"
            # Accept licenses
            yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" --licenses 2>/dev/null || true
          else
            echo "SDK not found at $SDK, checking alternatives..."
            ls /usr/local/lib/android/ 2>/dev/null || echo "No android dir"
            echo "$ANDROID_HOME" >&2
          fi
          echo "--- Android SDK status ---"
          echo "ANDROID_HOME=${ANDROID_HOME:-<unset>}"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-<unset>}"
          echo "JAVA_HOME=${JAVA_HOME}"
          ls -la "$SDK/platforms/" 2>/dev/null || echo "No platforms dir"
          ls -la "$SDK/build-tools/" 2>/dev/null || echo "No build-tools dir"
          echo "--- Searching for Android SDK anywhere ---"
          find / -maxdepth 4 -name "platforms" -type d 2>/dev/null | head -5
          echo "--- ANDROID_HOME in env ---"
          env | grep -i android | head -10 || echo "No Android env vars"
          echo "--- ubuntu version ---"
          cat /etc/os-release | head -5 || true

      - name: Decode keystore (if available)
        id: keystore
        shell: bash
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks
            echo "keystore_file=app/keystore.jks" >> $GITHUB_OUTPUT
            echo "keystore_password=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_OUTPUT
            echo "key_alias=${{ secrets.KEY_ALIAS }}" >> $GITHUB_OUTPUT
            echo "key_password=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_OUTPUT
            echo "has_keystore=true" >> $GITHUB_OUTPUT
          else
            echo "has_keystore=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Debug APK
        shell: bash
        run: |
          ./gradlew assembleDebug --stacktrace 2>&1 || {
            echo "### ⛔ Gradle build failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          }

      - name: Build Release APK (if keystore configured)
        if: steps.keystore.outputs.has_keystore == 'true'
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ steps.keystore.outputs.keystore_file }} \
            -Pandroid.injected.signing.store.password=${{ steps.keystore.outputs.keystore_password }} \
            -Pandroid.injected.signing.key.alias=${{ steps.keystore.outputs.key_alias }} \
            -Pandroid.injected.signing.key.password=${{ steps.keystore.outputs.key_password }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: HHMusic-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Release APK
        if: steps.keystore.outputs.has_keystore == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: HHMusic-release-${{ github.sha }}
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: ignore

      - name: Create Release on tag
        if: startsWith(github.ref, 'refs/tags/v') && steps.keystore.outputs.has_keystore == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
