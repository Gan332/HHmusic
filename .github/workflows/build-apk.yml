# ============================================================
# HHMusic — Android APK 自动编译
# 触发条件：
#   - push / PR 到 main 分支（android/ 下有变更时）
#   - 手动触发 (workflow_dispatch)
#   - 打 tag (v*) 时额外产出 release APK
# ============================================================
name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
    paths:
      - 'android/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Decode keystore (if available)
        id: keystore
        shell: bash
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks
            echo "keystore_file=app/keystore.jks" >> $GITHUB_OUTPUT
            echo "keystore_password=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_OUTPUT
            echo "key_alias=${{ secrets.KEY_ALIAS }}" >> $GITHUB_OUTPUT
            echo "key_password=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_OUTPUT
            echo "has_keystore=true" >> $GITHUB_OUTPUT
          else
            echo "has_keystore=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK (if keystore configured)
        if: steps.keystore.outputs.has_keystore == 'true'
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ steps.keystore.outputs.keystore_file }} \
            -Pandroid.injected.signing.store.password=${{ steps.keystore.outputs.keystore_password }} \
            -Pandroid.injected.signing.key.alias=${{ steps.keystore.outputs.key_alias }} \
            -Pandroid.injected.signing.key.password=${{ steps.keystore.outputs.key_password }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: HHMusic-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Release APK
        if: steps.keystore.outputs.has_keystore == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: HHMusic-release-${{ github.sha }}
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: ignore

      - name: Create Release on tag
        if: startsWith(github.ref, 'refs/tags/v') && steps.keystore.outputs.has_keystore == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
